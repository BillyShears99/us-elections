function getPartyColor(party) {

}

// ===== STATE =====
let currentIndex = elections.length - 1; // Start at most recent

// ===== DOM REFS =====
const yearNumber = document.getElementById('yearNumber');
const eraBadge = document.getElementById('eraBadge');
const winnerSummary = document.getElementById('winnerSummary');
const evBar = document.getElementById('evBar');
const majorityMarker = document.getElementById('majorityMarker');
const evLegend = document.getElementById('evLegend');
const kpiRow = document.getElementById('kpiRow');
const candidateCards = document.getElementById('candidateCards');
const contextNote = document.getElementById('contextNote');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const timelineInner = document.getElementById('timelineInner');
const themeToggle = document.getElementById('themeToggle');

// ===== THEME =====
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
let isDark = prefersDark;
if (isDark) document.documentElement.classList.add('dark');
themeToggle.textContent = isDark ? '🌙' : '☀️';

themeToggle.addEventListener('click', () => {
  isDark = !isDark;
  document.documentElement.classList.toggle('dark', isDark);
  themeToggle.textContent = isDark ? '🌙' : '☀️';
});

// ===== FORMAT HELPERS =====
function fmtNum(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(0) + 'K';
  return n.toLocaleString();
}
function fmtPct(p) {
  return p != null ? p.toFixed(1) + '%' : '—';
}

// ===== RENDER =====
function render() {
  const el = elections[currentIndex];
  const winner = el.candidates.find(c => c.winner);

  // Year & era
  yearNumber.textContent = el.year;
  eraBadge.textContent = el.era;

  // Winner summary
  winnerSummary.innerHTML = `<span class="winner-name-highlight">${winner.name}</span> (${winner.party}) won`;

  // Nav buttons
  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === elections.length - 1;

  // Electoral bar
  renderEVBar(el);

  // KPI cards
  renderKPIs(el, winner);

  // Candidate cards
  renderCandidates(el);

  // Context note
  contextNote.textContent = el.note;

  // Timeline highlight
  document.querySelectorAll('.timeline-bar').forEach((bar, i) => {
    bar.classList.toggle('selected', i === currentIndex);
  });

  // Scroll timeline to show selected bar
  const selectedBar = timelineInner.children[currentIndex];
  if (selectedBar) {
    const scroll = document.getElementById('timelineScroll');
    const barLeft = selectedBar.offsetLeft;
    const barWidth = selectedBar.offsetWidth;
    const scrollWidth = scroll.offsetWidth;
    scroll.scrollLeft = barLeft - scrollWidth / 2 + barWidth / 2;
  }

  // Fade in
  [evBar, kpiRow, candidateCards, contextNote].forEach(el => {
    el.classList.remove('fade-in');
    void el.offsetWidth;
    el.classList.add('fade-in');
  });
}

function renderEVBar(el) {
  evBar.innerHTML = '';
  evLegend.innerHTML = '';

  const totalEV = el.totalEV;
  const majority = Math.floor(totalEV / 2) + 1;

  // Sort candidates by EV descending
  const sorted = [...el.candidates].sort((a, b) => (b.ev || 0) - (a.ev || 0));

  sorted.forEach(c => {
    if (!c.ev) return;
    const pct = (c.ev / totalEV) * 100;
    const color = getPartyColor(c.party);
    const seg = document.createElement('div');
    seg.className = 'ev-bar-segment';
    seg.style.cssText = `width:${pct}%;background:${color};`;
    seg.innerHTML = pct > 6 ? `<span>${c.ev}</span>` : '';
    evBar.appendChild(seg);

    // Legend item
    const item = document.createElement('div');
    item.className = 'ev-legend-item';
    item.innerHTML = `
      <div class="ev-legend-dot" style="background:${color}"></div>
      <span class="ev-legend-name">${c.name.split(' ').pop()}</span>
      <span class="ev-legend-val">${c.ev} EV</span>
    `;
    evLegend.appendChild(item);
  });

  // Majority marker
  const markerPct = (majority / totalEV) * 100;
  majorityMarker.style.left = markerPct + '%';
  majorityMarker.setAttribute('data-label', majority + ' to win');
}

function renderKPIs(el, winner) {
  const kpis = [];

  kpis.push({ label: 'Total EV', value: el.totalEV });
  kpis.push({ label: 'Winner EV', value: winner.ev });

  if (el.popTotal) {
    kpis.push({ label: 'Total Votes', value: fmtNum(el.popTotal) });
  }
  if (winner.pop) {
    kpis.push({ label: 'Winner Votes', value: fmtNum(winner.pop) });
  }
  if (winner.popPct) {
    kpis.push({ label: 'Winner %', value: fmtPct(winner.popPct) });
  }
  if (el.turnout) {
    kpis.push({ label: 'Turnout', value: fmtPct(el.turnout) });
  }

  kpiRow.innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-label">${k.label}</div>
    </div>
  `).join('');
}

function renderCandidates(el) {
  const sorted = [...el.candidates].sort((a, b) => (b.ev || 0) - (a.ev || 0));

  candidateCards.innerHTML = sorted.map(c => {
    const color = getPartyColor(c.party);
    const evPct = el.totalEV ? (c.ev / el.totalEV * 100) : 0;
    const popPct = c.popPct || 0;
    const isWinner = c.winner;

    return `
    <div class="candidate-card ${isWinner ? 'winner' : ''}" style="--candidate-color:${color}">
      <div class="candidate-header">
        <div class="candidate-info">
          <div class="candidate-name">${c.name}</div>
          <div class="candidate-party">${c.party}</div>
          ${c.mate ? `<div class="candidate-mate">Running mate: ${c.mate}</div>` : ''}
        </div>
        ${isWinner ? '<div class="winner-badge">Winner</div>' : ''}
      </div>
      <div class="candidate-stats">
        <div class="stat-row">
          <div class="stat-label-row">
            <span class="stat-label">Electoral Votes</span>
            <span class="stat-value">${c.ev != null ? c.ev : '—'}</span>
          </div>
          ${c.ev != null ? `<div class="progress-track"><div class="progress-fill" style="width:${evPct}%"></div></div>` : ''}
        </div>
        ${c.pop ? `
        <div class="stat-row">
          <div class="stat-label-row">
            <span class="stat-label">Popular Votes</span>
            <span class="stat-value">${c.pop.toLocaleString()}${c.popPct ? ' (' + c.popPct + '%)' : ''}</span>
          </div>
          ${popPct ? `<div class="progress-track"><div class="progress-fill" style="width:${popPct}%"></div></div>` : ''}
        </div>` : ''}
      </div>
    </div>
    `;
  }).join('');
}

// ===== NAVIGATION =====
prevBtn.addEventListener('click', () => {
  if (currentIndex > 0) { currentIndex--; render(); }
});
nextBtn.addEventListener('click', () => {
  if (currentIndex < elections.length - 1) { currentIndex++; render(); }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; render(); }
  if (e.key === 'ArrowRight' && currentIndex < elections.length - 1) { currentIndex++; render(); }
});

// ===== TIMELINE =====
function buildTimeline() {
  const maxEV = Math.max(...elections.map(e => e.candidates.find(c=>c.winner)?.ev || 0));

  elections.forEach((el, i) => {
    const winner = el.candidates.find(c => c.winner);
    const color = getPartyColor(winner?.party || 'Other');
    const evH = winner?.ev ? Math.max(8, (winner.ev / maxEV) * 64) : 8;
    const isDecade = el.year % 20 === 0;

    const bar = document.createElement('div');
    bar.className = 'timeline-bar' + (isDecade ? ' decade-mark' : '');
    bar.style.cssText = `height:${evH}px;background:${color};`;
    bar.setAttribute('data-year', el.year);
    bar.setAttribute('title', `${el.year}: ${winner?.name}`);
    bar.addEventListener('click', () => { currentIndex = i; render(); });
    timelineInner.appendChild(bar);
  });
}

buildTimeline();
render();
</script>
</body>
</html>
